name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: git config user.name "github-actions[bot]"

      - run: git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: npm version ${{ github.event.inputs.version_type }} -m "chore(release): %s"

      - run: git push --follow-tags origin main
