name: Validate

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build

      - run: npm run pretest

      - name: Run tests
        shell: bash
        run: |
          shopt -s globstar nullglob
          test_files=(dist-test/**/*.test.js)
          if [[ ${#test_files[@]} -gt 0 ]]; then
            node --test "${test_files[@]}"
          else
            echo "No test files found"
          fi
